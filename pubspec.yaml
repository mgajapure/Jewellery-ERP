name: jewellery_erp
description: A modern Flutter starter application for Jewellery ERP.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  fl_chart: ^1.2.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  responsive_framework: ^1.5.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
